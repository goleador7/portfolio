<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goleador</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline>
  <source src="src/background.mp4" type="video/mp4">
</video>
<div id="bg-overlay"></div>

<div id="app">

  <!-- HEADER -->
  <div id="topbar">
    <span id="topbar-brand">Goleador</span>
    <span id="topbar-clock"></span>
  </div>

  <!-- CAROUSEL -->
  <div id="carousel-wrap">
    <div id="icon-track"></div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- STATUS BAR -->
  <div id="statusbar">
    <div style="display:flex;gap:16px;">
      <span><span class="key">←</span> <span class="key">→</span> Navigate</span>
      <span><span class="key">Enter</span> Select</span>
    </div>
    <span></span>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
